name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          NEXT_PUBLIC_FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          NEXT_PUBLIC_STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          NEXT_PUBLIC_STRAVA_WORKER_URL: ${{ vars.STRAVA_WORKER_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
